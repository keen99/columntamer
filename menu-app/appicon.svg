<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4A90E2"/>
      <stop offset="1" stop-color="#2A5C9E"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <!-- 3 Finder columns -->
  <g fill="#FFFFFF">
    <rect x="232" y="264" width="140" height="496" rx="16" opacity="0.95"/>
    <rect x="442" y="264" width="140" height="496" rx="16" opacity="0.85"/>
    <rect x="652" y="264" width="140" height="496" rx="16" opacity="0.75"/>
  </g>
  <!-- width arrow: left column grows -->
  <g stroke="#FFD15C" stroke-width="36" stroke-linecap="round" fill="none">
    <line x1="150" y1="512" x2="290" y2="512"/>
    <polyline points="210,470 150,512 210,554"/>
  </g>
  <!-- width arrow: right column shrinks -->
  <g stroke="#FF7A7A" stroke-width="36" stroke-linecap="round" fill="none">
    <line x1="730" y1="512" x2="870" y2="512"/>
    <polyline points="810,470 870,512 810,554"/>
  </g>
</svg>
